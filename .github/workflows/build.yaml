name: Build

# ============================================================
# 公共构建仓库：仅含 workflow，私有源码通过 PAT 在 CI 内拉取。
#
# 必须在本仓库 Settings → Secrets and variables → Actions 中配置：
#   PRIVATE_REPO_TOKEN  - 有私有仓库 read 权限的 PAT
#   BUILD_BOT_TOKEN     - TG Bot Token（用于构建完成后发包，可与业务 Bot 共用）
#
# 【Android 正式签名（可选，不配置则用 debug 签名）】
#   KEYSTORE            - keystore.jks 的 base64 编码
#   KEY_ALIAS           - keystore 别名
#   STORE_PASSWORD      - keystore 密码
#   KEY_PASSWORD        - key 密码
# ============================================================

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: '私有仓库的 tag/branch（如 v1.0.15 或 main）'
        required: true
        default: 'main'

      # ── 构建目标 ────────────────────────────────────────────
      platforms:
        description: '构建平台，逗号分隔（android,windows,linux,macos,ios,openwrt），留空=全部'
        required: false
        default: ''

      # ── 品牌定制 ────────────────────────────────────────────
      app_name:
        description: 'App 显示名称（留空=不修改）'
        required: false
        default: ''
      app_logo_url:
        description: 'App Logo URL（PNG，建议 1024x1024，留空=不修改）'
        required: false
        default: ''
      app_version:
        description: '版本号（如 1.2.0，留空=不修改）'
        required: false
        default: ''

      # ── 远程配置源（最多 4 个，主 + 3 个备用）──────────────
      oss_url_1:
        description: '主配置源 URL（config.json）'
        required: false
        default: ''
      oss_url_2:
        description: '备用配置源 2（可选）'
        required: false
        default: ''
      oss_url_3:
        description: '备用配置源 3（可选）'
        required: false
        default: ''
      oss_url_4:
        description: '备用配置源 4（可选）'
        required: false
        default: ''
      panel_type:
        description: 'panel_type（xboard / v2board）'
        required: false
        default: 'xboard'
      api_prefix:
        description: 'API 路径前缀（默认 /api/v1，PPanel 用 /v1）'
        required: false
        default: '/api/v1'

      # ── 默认 UA ────────────────────────────────────────────
      default_ua:
        description: '默认 User-Agent（留空=Apex/v版本号，后端通过 flag 参数协商格式，UA 仅用于标识）'
        required: false
        default: ''

      # ── 加密密钥（与 App 源码 _xorKey 及 Bot 生成远程配置时使用相同的密钥）──
      xor_key:
        description: 'XOR 加密密钥（必须与 App 端 _xorKey 完全一致，≥16 字符）'
        required: false
        default: ''

      # ── 客服 & 联系方式（写入远程配置，不烧录进包）─────────
      telegram_channel:
        description: 'TG 订阅频道（如 https://t.me/jichangbiji，写入远程配置）'
        required: false
        default: ''
      crisp_id:
        description: 'Crisp 客服 ID（留空=不启用）'
        required: false
        default: ''
      salesmartly_token:
        description: 'Salesmartly 客服 Token（留空=不启用，优先于 Crisp）'
        required: false
        default: ''

      # ── 构建完成通知 ────────────────────────────────────────
      notify_chat_id:
        description: '构建完成后发包的 TG Chat ID（Bot Token 存 secret BUILD_BOT_TOKEN）'
        required: false
        default: ''

env:
  PRIVATE_REF: ${{ github.event_name == 'push' && github.ref_name || inputs.ref }}
  IS_STABLE: ${{ github.event_name == 'push' && !contains(github.ref, '-') || github.event_name != 'push' && !contains(inputs.ref, '-') }}

jobs:
  # ── 预处理：根据 inputs.platforms 动态生成矩阵 ─────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: |
          python3 << 'EOF'
          import json, os

          all_items = [
            {"platform": "android", "os": "ubuntu-latest",  "flavor": "mobile"},
            {"platform": "android", "os": "ubuntu-latest",  "flavor": "tv"},
            {"platform": "linux",   "os": "ubuntu-latest",  "arch": "amd64"},
            {"platform": "macos",   "os": "macos-latest",   "arch": "universal"},
            {"platform": "windows", "os": "windows-latest", "arch": "amd64"},
            {"platform": "ios",     "os": "macos-latest",   "arch": "arm64"},
          ]

          # 平台选择映射：
          #   "android-mobile" → android flavor=mobile
          #   "android-tv"     → android flavor=tv
          #   "android"        → android mobile + tv（向后兼容）
          event_name   = os.environ.get("EVENT_NAME", "")
          platforms_in = os.environ.get("PLATFORMS", "").strip()

          if event_name == "push" or not platforms_in:
            filtered = all_items
          else:
            selected = {p.strip() for p in platforms_in.split(",") if p.strip()}
            filtered = []
            for item in all_items:
              if item["platform"] == "android":
                flavor = item.get("flavor", "")
                # "android" 选中两者，"android-mobile"/"android-tv" 单选
                if "android" in selected or f"android-{flavor}" in selected:
                  filtered.append(item)
              else:
                if item["platform"] in selected:
                  filtered.append(item)

          matrix = json.dumps({"include": filtered})
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"matrix={matrix}\n")
          EOF
        env:
          EVENT_NAME: ${{ github.event_name }}
          PLATFORMS:  ${{ inputs.platforms }}

  build:
    needs: setup
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      # ── 0. 配置 git 凭据 ────────────────────────────────────
      - name: Configure git credentials
        run: |
          git config --global credential.helper ""
          git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # ── 1. 拉取私有源码 ─────────────────────────────────────
      - name: Checkout private source
        env:
          GIT_TERMINAL_PROMPT: "0"
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          submodules: recursive
          ref: ${{ env.PRIVATE_REF }}

      # ── 2. 注入构建参数（仅 workflow_dispatch 触发时执行）────
      - name: Inject build parameters
        if: github.event_name == 'workflow_dispatch'
        env:
          PYTHONUTF8:     "1"
          APP_NAME:       ${{ inputs.app_name }}
          APP_LOGO_URL:   ${{ inputs.app_logo_url }}
          APP_VERSION:    ${{ inputs.app_version }}
          PANEL_TYPE:     ${{ inputs.panel_type || 'xboard' }}
          API_PREFIX:     ${{ inputs.api_prefix || '/api/v1' }}
          OSS_URL_1:      ${{ inputs.oss_url_1 }}
          OSS_URL_2:      ${{ inputs.oss_url_2 }}
          OSS_URL_3:      ${{ inputs.oss_url_3 }}
          OSS_URL_4:      ${{ inputs.oss_url_4 }}
          DEFAULT_UA:     ${{ inputs.default_ua }}
          TARGET_PLATFORM: ${{ matrix.platform }}
        run: |
          python3 -m pip install Pillow pyyaml pypinyin --quiet --break-system-packages 2>/dev/null || \
          python3 -m pip install Pillow pyyaml pypinyin --quiet --user 2>/dev/null || \
          python3 -m pip install Pillow pyyaml pypinyin --quiet
          python3 -X utf8 << 'PYEOF'
          import os, re, io, urllib.request
          from pathlib import Path

          def env(k, d=''):
              return os.environ.get(k, d).strip()

          # ── 1. 替换应用名称 ─────────────────────────────────
          app_name = env('APP_NAME')
          if app_name:
              # Android strings.xml
              p = Path('android/app/src/main/res/values/strings.xml')
              if p.exists():
                  p.write_text(re.sub(
                      r'<string name="app_name">[^<]*</string>',
                      f'<string name="app_name">{app_name}</string>',
                      p.read_text()
                  ))
                  print(f'[inject] Android app_name → {app_name}')
              # Windows CMakeLists.txt（控制 .exe 文件名，CMake 不支持中文/非 ASCII）
              win_binary = re.sub(r'[\s/\\:*?"<>|]+', '_', app_name)
              win_binary = re.sub(r'[^\x00-\x7F]+', '', win_binary)   # 去掉中文等非 ASCII
              win_binary = re.sub(r'[^a-zA-Z0-9_-]+', '_', win_binary).strip('_') or 'Apex'
              p = Path('windows/CMakeLists.txt')
              if p.exists():
                  p.write_text(re.sub(
                      r'set\(BINARY_NAME\s+"[^"]*"\)',
                      f'set(BINARY_NAME "{win_binary}")', p.read_text()
                  ))
                  print(f'[inject] Windows BINARY_NAME → {win_binary}')
              # Windows packaging/exe/make_config.yaml（installer 配置，executable_name 必须与 BINARY_NAME 一致）
              p = Path('windows/packaging/exe/make_config.yaml')
              if p.exists():
                  import yaml as _yaml2
                  cfg = _yaml2.safe_load(p.read_text()) or {}
                  cfg['app_name'] = app_name
                  cfg['display_name'] = app_name
                  cfg['install_dir_name'] = '{pf}\\' + app_name
                  cfg['executable_name'] = f'{win_binary}.exe'
                  cfg['output_base_file_name'] = win_binary
                  p.write_text(_yaml2.dump(cfg, default_flow_style=False, allow_unicode=True))
                  print(f'[inject] Windows make_config.yaml → display_name={app_name}, install_dir={app_name}')
              # Windows Runner.rc（文件属性 ProductName / FileDescription）
              p = Path('windows/runner/Runner.rc')
              if p.exists():
                  txt = p.read_text(encoding='utf-8', errors='replace')
                  txt = re.sub(r'VALUE "ProductName",\s*"[^"]*"',    f'VALUE "ProductName", "{app_name}"',    txt)
                  txt = re.sub(r'VALUE "FileDescription",\s*"[^"]*"', f'VALUE "FileDescription", "{app_name}"', txt)
                  p.write_text(txt, encoding='utf-8')
                  print(f'[inject] Windows ProductName → {app_name}')
              # Windows main.cpp（窗口标题，直接写 UTF-8 中文，CMakeLists 已加 /utf-8）
              p = Path('windows/runner/main.cpp')
              if p.exists():
                  txt = p.read_text(encoding='utf-8')
                  txt = re.sub(
                      r'window\.Create\(L"[^"]*"',
                      f'window.Create(L"{app_name}"', txt
                  )
                  p.write_text(txt, encoding='utf-8-sig')
                  print(f'[inject] Windows window title → {app_name}')
              # macOS Info.plist
              p = Path('macos/Runner/Info.plist')
              if p.exists():
                  txt = p.read_text()
                  txt = re.sub(
                      r'(<key>CFBundleName</key>\s*<string>)[^<]*(</string>)',
                      rf'\g<1>{app_name}\g<2>', txt)
                  txt = re.sub(
                      r'(<key>CFBundleDisplayName</key>\s*<string>)[^<]*(</string>)',
                      rf'\g<1>{app_name}\g<2>', txt)
                  p.write_text(txt)
                  print(f'[inject] macOS CFBundleName/CFBundleDisplayName → {app_name}')
              # macOS AppInfo.xcconfig PRODUCT_NAME（决定 .app 文件名）
              # macOS Xcode 原生支持 Unicode，PRODUCT_NAME 可直接使用中文
              # （不同于 Windows CMake / Linux deb 需要 ASCII）
              mac_binary = app_name
              p = Path('macos/Runner/Configs/AppInfo.xcconfig')
              if p.exists():
                  txt = p.read_text()
                  txt = re.sub(
                      r'^PRODUCT_NAME\s*=\s*.*$',
                      f'PRODUCT_NAME = {mac_binary}',
                      txt, flags=re.MULTILINE
                  )
                  txt = re.sub(
                      r'^DISPLAY_NAME\s*=\s*.*$',
                      f'DISPLAY_NAME = {app_name}',
                      txt, flags=re.MULTILINE
                  )
                  p.write_text(txt)
                  print(f'[inject] macOS PRODUCT_NAME → {mac_binary}, DISPLAY_NAME → {app_name}')
              # macOS DMG make_config.yaml（appdmg 引用的 .app 路径）
              p = Path('macos/packaging/dmg/make_config.yaml')
              if p.exists():
                  import yaml as _yaml_dmg
                  dmg_cfg = _yaml_dmg.safe_load(p.read_text()) or {}
                  dmg_cfg['title'] = app_name
                  for item in dmg_cfg.get('contents', []):
                      if item.get('type') == 'file' and str(item.get('path', '')).endswith('.app'):
                          item['path'] = f'{mac_binary}.app'
                  p.write_text(_yaml_dmg.dump(dmg_cfg, default_flow_style=False, allow_unicode=True))
                  print(f'[inject] macOS DMG config → title={app_name}, app={mac_binary}.app')
              # iOS Info.plist — CFBundleDisplayName + CFBundleName
              p = Path('ios/Runner/Info.plist')
              if p.exists():
                  txt = p.read_text()
                  txt = re.sub(
                      r'(<key>CFBundleName</key>\s*<string>)[^<]*(</string>)',
                      rf'\g<1>{app_name}\g<2>', txt)
                  # Add CFBundleDisplayName if missing, or replace existing
                  if 'CFBundleDisplayName' in txt:
                      txt = re.sub(
                          r'(<key>CFBundleDisplayName</key>\s*<string>)[^<]*(</string>)',
                          rf'\g<1>{app_name}\g<2>', txt)
                  else:
                      txt = txt.replace(
                          '<key>CFBundleName</key>',
                          f'<key>CFBundleDisplayName</key>\n\t<string>{app_name}</string>\n\t<key>CFBundleName</key>')
                  p.write_text(txt)
                  print(f'[inject] iOS CFBundleName/DisplayName → {app_name}')
              # Linux CMakeLists.txt（CMake 不支持空格/特殊字符作为 target 名，与 Windows 处理一致）
              linux_binary = re.sub(r'[\s/\\:*?"<>|]+', '_', app_name)
              linux_binary = re.sub(r'[^\x00-\x7F]+', '', linux_binary)   # 去掉中文等非 ASCII
              linux_binary = re.sub(r'[^a-zA-Z0-9_-]+', '_', linux_binary).strip('_') or 'apex'
              p = Path('linux/CMakeLists.txt')
              if p.exists():
                  p.write_text(re.sub(
                      r'set\(BINARY_NAME\s+"[^"]*"\)',
                      f'set(BINARY_NAME "{linux_binary}")', p.read_text()
                  ))
                  print(f'[inject] Linux BINARY_NAME → {linux_binary}')
              # Linux packaging configs (deb/rpm/appimage) — display_name 控制桌面图标名
              for pkg_type in ['deb', 'rpm', 'appimage']:
                  p = Path(f'linux/packaging/{pkg_type}/make_config.yaml')
                  if p.exists():
                      import yaml as _yaml_linux
                      cfg = _yaml_linux.safe_load(p.read_text()) or {}
                      cfg['display_name'] = app_name
                      if 'generic_name' in cfg:
                          cfg['generic_name'] = app_name
                      # Update keywords list
                      if 'keywords' in cfg and isinstance(cfg['keywords'], list):
                          cfg['keywords'] = [app_name] + [k for k in cfg['keywords'] if k != 'Apex']
                      p.write_text(_yaml_linux.dump(cfg, default_flow_style=False, allow_unicode=True))
                      print(f'[inject] Linux {pkg_type} display_name → {app_name}')
              # distribute_options.yaml（控制输出文件名 + RPM Name）
              # RPM 的 Name 字段不支持非 ASCII，仅 Linux 构建用拼音
              p = Path('distribute_options.yaml')
              if p.exists():
                  import yaml as _yaml
                  opts = _yaml.safe_load(p.read_text()) or {}
                  target_plat = os.environ.get('TARGET_PLATFORM', '')
                  has_non_ascii = any(ord(c) > 127 for c in app_name)
                  if target_plat == 'linux' and has_non_ascii:
                      from pypinyin import lazy_pinyin
                      dist_name = ''.join(lazy_pinyin(app_name)) or 'apex'
                  else:
                      dist_name = app_name
                  opts['app_name'] = dist_name
                  p.write_text(_yaml.dump(opts, default_flow_style=False, allow_unicode=True))
                  print(f'[inject] distribute_options.yaml app_name → {dist_name}')
              # lib/common/constant.dart（应用内名称、窗口标题）
              p = Path('lib/common/constant.dart')
              if p.exists():
                  txt = p.read_text(encoding='utf-8')
                  txt = re.sub(r'(const appName\s*=\s*")[^"]*(")', rf'\g<1>{app_name}\g<2>', txt)
                  # appNameEn 用于 User-Agent，必须 ASCII；中文名 → 用 bin_prefix 或默认 Apex
                  en_name = re.sub(r'[^a-zA-Z0-9]+', '', app_name) or 'Apex'
                  txt = re.sub(r'(const appNameEn\s*=\s*")[^"]*(")', rf'\g<1>{en_name}\g<2>', txt)
                  p.write_text(txt, encoding='utf-8')
                  print(f'[inject] constant.dart appName → {app_name}, appNameEn → {en_name}')

              # ── 2. 重命名核心二进制文件前缀 ──────────────────
              # 英文名 → 用作文件前缀；含非 ASCII（如中文）→ 默认 Apex
              bin_prefix = re.sub(r'[^a-zA-Z0-9]+', '', app_name)
              if not bin_prefix or bin_prefix != re.sub(r'[\s/\\:*?"<>|]+', '', app_name):
                  bin_prefix = 'Apex'
              if bin_prefix != 'Apex':
                  _rename_map = {
                      'ApexCore': f'{bin_prefix}Core',
                      'ApexHelperService': f'{bin_prefix}HelperService',
                  }
                  # constant.dart：helperService 名和 socket 路径
                  p = Path('lib/common/constant.dart')
                  if p.exists():
                      txt = p.read_text(encoding='utf-8')
                      txt = re.sub(r'(const appHelperService\s*=\s*")[^"]*(")',
                                   rf'\g<1>{bin_prefix}HelperService\g<2>', txt)
                      txt = re.sub(r'/tmp/ApexSocket_', f'/tmp/{bin_prefix}Socket_', txt)
                      p.write_text(txt, encoding='utf-8')
                  # path.dart：核心文件名
                  p = Path('lib/common/path.dart')
                  if p.exists():
                      txt = p.read_text(encoding='utf-8')
                      txt = txt.replace('ApexCore', f'{bin_prefix}Core')
                      p.write_text(txt, encoding='utf-8')
                  # setup.dart
                  p = Path('setup.dart')
                  if p.exists():
                      txt = p.read_text(encoding='utf-8')
                      txt = txt.replace('"ApexCore"', f'"{bin_prefix}Core"')
                      txt = txt.replace('"ApexHelperService', f'"{bin_prefix}HelperService')
                      p.write_text(txt, encoding='utf-8')
                  # windows/CMakeLists.txt
                  p = Path('windows/CMakeLists.txt')
                  if p.exists():
                      txt = p.read_text(encoding='utf-8')
                      for old, new in _rename_map.items():
                          txt = txt.replace(f'{old}.exe', f'{new}.exe')
                      p.write_text(txt, encoding='utf-8')
                  # linux/CMakeLists.txt
                  p = Path('linux/CMakeLists.txt')
                  if p.exists():
                      txt = p.read_text(encoding='utf-8')
                      txt = txt.replace('ApexCore', f'{bin_prefix}Core')
                      p.write_text(txt, encoding='utf-8')
                  # inno_setup.iss
                  for iss in Path('.').rglob('inno_setup.iss'):
                      txt = iss.read_text(encoding='utf-8')
                      for old, new in _rename_map.items():
                          txt = txt.replace(f'{old}.exe', f'{new}.exe')
                      iss.write_text(txt, encoding='utf-8')
                  # services/helper windows.rs（SERVICE_NAME）
                  p = Path('services/helper/src/service/windows.rs')
                  if p.exists():
                      txt = p.read_text(encoding='utf-8')
                      txt = txt.replace('ApexHelperService', f'{bin_prefix}HelperService')
                      p.write_text(txt, encoding='utf-8')
                  # macOS project.pbxproj
                  p = Path('macos/Runner.xcodeproj/project.pbxproj')
                  if p.exists():
                      txt = p.read_text(encoding='utf-8')
                      txt = txt.replace('ApexCore', f'{bin_prefix}Core')
                      p.write_text(txt, encoding='utf-8')
                  # 重命名 libclash 下的预编译二进制
                  for d in Path('libclash').glob('*'):
                      if d.is_dir():
                          for old, new in _rename_map.items():
                              for ext in ['', '.exe']:
                                  src = d / f'{old}{ext}'
                                  if src.exists():
                                      src.rename(d / f'{new}{ext}')
                                      print(f'[inject] 重命名: {src.name} → {new}{ext}')
                  print(f'[inject] 二进制前缀 → {bin_prefix}')

          # ── 3. 替换版本号 ───────────────────────────────────
          ver = env('APP_VERSION')
          if ver:
              p = Path('pubspec.yaml')
              txt = p.read_text()
              # Flutter 要求 version: X.Y.Z+buildNumber，缺少 +N 会导致版本不生效
              pubspec_ver = ver if '+' in ver else f'{ver}+1'
              txt = re.sub(r'^(version:\s*)\S+', rf'\g<1>{pubspec_ver}',
                           txt, flags=re.MULTILINE)
              p.write_text(txt)
              print(f'[inject] pubspec version → {pubspec_ver}')

              # 同步版本号到 release_config_plaintext.json
              release_ver = ver.split('+')[0]  # 纯版本号，不含 buildNumber
              cfg_file = Path('release_config_plaintext.json')
              if cfg_file.exists():
                  cfg_txt = cfg_file.read_text(encoding='utf-8')
                  cfg_txt = re.sub(r'"version"\s*:\s*"[^"]*"',
                                   f'"version": "{release_ver}"', cfg_txt)
                  cfg_file.write_text(cfg_txt, encoding='utf-8')
                  print(f'[inject] release_config version → {release_ver}')

          # ── 3b. 替换默认 UA ────────────────────────────────
          default_ua = env('DEFAULT_UA')
          if default_ua:
              p = Path('lib/common/package.dart')
              if p.exists():
                  txt = p.read_text(encoding='utf-8')
                  txt = re.sub(
                      r'''String get ua => ["'][^"']*["']''',
                      f'String get ua => "{default_ua}"',
                      txt
                  )
                  p.write_text(txt, encoding='utf-8')
                  print(f'[inject] default UA → {default_ua}')

          # ── 4. 注入 panel_type 到 assets/config/config.yaml ──
          # 注意：OSS URL 不写入 config.yaml（安装目录明文可见），
          # 仅通过 dart-define 编译注入（二进制内嵌，不可直接读取）
          panel_type = env('PANEL_TYPE') or 'xboard'
          p = Path('assets/config/config.yaml')
          if p.exists():
              txt = p.read_text(encoding='utf-8')
              txt = re.sub(r'^panel_type:\s*\S+', f'panel_type: {panel_type}', txt, flags=re.MULTILINE)
              p.write_text(txt, encoding='utf-8')
              print(f'[inject] config.yaml panel_type → {panel_type}')

          # ── 4b. 注入 api_prefix 到 assets/config/config.yaml ──
          # Git Bash (MSYS2) 会把 /api/v1 转换为 C:/Program Files/Git/api/v1
          # 需要检测并还原
          api_prefix = env('API_PREFIX') or '/api/v1'
          if re.match(r'^[A-Z]:[/\\]', api_prefix):
              original = api_prefix
              # 去掉盘符和 Git 安装路径前缀，还原为 /xxx/vN 形式
              api_prefix = re.sub(r'^[A-Z]:[/\\](?:Program Files[/\\]Git)?', '', api_prefix).replace('\\', '/')
              if not api_prefix.startswith('/'):
                  api_prefix = '/' + api_prefix
              print(f'[inject] ⚠️ api_prefix 被 MSYS 路径转换: {original} → 已修正为: {api_prefix}')
          p = Path('assets/config/config.yaml')
          if p.exists():
              txt = p.read_text(encoding='utf-8')
              # 替换已有的 api_prefix（含注释掉的）
              if re.search(r'^#?\s*api_prefix:', txt, flags=re.MULTILINE):
                  txt = re.sub(r'^#?\s*api_prefix:\s*\S+', f'api_prefix: {api_prefix}', txt, flags=re.MULTILINE)
              else:
                  # 不存在则追加到 panel_type 后
                  txt = re.sub(r'^(panel_type:\s*\S+)', rf'\1\napi_prefix: {api_prefix}', txt, flags=re.MULTILINE)
              p.write_text(txt, encoding='utf-8')
              print(f'[inject] config.yaml api_prefix → {api_prefix}')

          # ── 5. 替换应用图标 ─────────────────────────────────
          # 仅在用户上传了自定义 Logo 时才处理 adaptive icon
          # 不再无条件删除 adaptive icon 文件，保留原始结构
          import glob as _glob

          logo_url = env('APP_LOGO_URL')
          if logo_url:
              try:
                  import json as _json
                  from PIL import Image

                  # 下载图片（带 User-Agent，支持重定向）
                  req = urllib.request.Request(logo_url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=30) as r:
                      img = Image.open(io.BytesIO(r.read())).convert('RGBA')
                  print(f'[inject] Logo 下载成功: {img.size}')

                  # ── Android mipmap ──────────────────────────
                  # Android 图标不加圆角（系统启动器会自动做 mask 裁切）
                  # 仅做 resize + 合成白底（防止透明背景在某些启动器上显示为纯黑）
                  def _android_icon(src, size):
                      ri = src.resize((size, size), Image.LANCZOS)
                      if ri.mode == 'RGBA':
                          bg = Image.new('RGBA', ri.size, (255, 255, 255, 255))
                          bg.paste(ri, mask=ri.split()[3])
                          return bg.convert('RGB')
                      return ri.convert('RGB')

                  # 用户上传了自定义 Logo 时：
                  # 1. 删除 adaptive icon XML（mipmap-anydpi-v26），让系统回退到普通 mipmap
                  # 2. 删除 foreground 图层文件
                  # 3. 删除 ic_launcher_background 颜色资源
                  # 这样 Android 会直接使用我们替换的 webp/png 图标
                  for xml_f in _glob.glob('android/app/src/main/res/mipmap-anydpi*/ic_launcher*.xml'):
                      Path(xml_f).unlink()
                      print(f'[inject] 删除 adaptive XML: {xml_f}')
                  for fg_f in _glob.glob('android/app/src/main/res/mipmap-*/ic_launcher_foreground.*'):
                      Path(fg_f).unlink()
                      print(f'[inject] 删除 foreground: {fg_f}')
                  bg_xml = Path('android/app/src/main/res/values/ic_launcher_background.xml')
                  if bg_xml.exists():
                      bg_xml.unlink()
                      print(f'[inject] 删除 ic_launcher_background.xml')
                  # 修复 values-v27/styles.xml 中对已删除颜色资源的引用
                  v27_styles = Path('android/app/src/main/res/values-v27/styles.xml')
                  if v27_styles.exists():
                      txt = v27_styles.read_text()
                      if '@color/ic_launcher_background' in txt:
                          txt = txt.replace('@color/ic_launcher_background', '#FAFAFA')
                          v27_styles.write_text(txt)
                          print('[inject] 修复 values-v27/styles.xml → 硬编码 #FAFAFA')

                  for folder, size in {
                      'mipmap-mdpi': 48, 'mipmap-hdpi': 72,
                      'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144,
                      'mipmap-xxxhdpi': 192,
                  }.items():
                      base = Path(f'android/app/src/main/res/{folder}')
                      if not base.exists():
                          continue
                      ri = _android_icon(img, size)
                      replaced = False
                      for stem in ['ic_launcher', 'ic_launcher_round']:
                          for ext, fmt in [('webp', 'WEBP'), ('png', 'PNG')]:
                              f = base / f'{stem}.{ext}'
                              if f.exists():
                                  ri.save(f, format=fmt)
                                  print(f'[inject] Android icon: {f}')
                                  replaced = True
                      if not replaced:
                          ri.save(base / 'ic_launcher.webp', format='WEBP')
                          print(f'[inject] Android icon (新建): {base}/ic_launcher.webp')

                  # Android Google Play 封面图
                  ps = Path('android/app/src/main/ic_launcher-playstore.png')
                  if ps.exists():
                      img.resize((512, 512), Image.LANCZOS).save(ps)
                      print(f'[inject] Android playstore icon: {ps}')

                  # ── Android TV banner (320x180) ────────────
                  tv_banner = Path('android/app/src/main/res/mipmap-xhdpi/ic_banner.png')
                  if tv_banner.exists():
                      bw, bh = 320, 180
                      banner_img = Image.new('RGBA', (bw, bh), (250, 250, 250, 255))
                      icon_h = int(bh * 0.6)
                      icon_resized = img.resize((icon_h, icon_h), Image.LANCZOS)
                      x = (bw - icon_h) // 2
                      y = (bh - icon_h) // 2
                      banner_img.paste(icon_resized, (x, y), icon_resized if icon_resized.mode == 'RGBA' else None)
                      banner_img.convert('RGB').save(tv_banner, format='PNG')
                      print(f'[inject] Android TV banner: {tv_banner}')

                  # ── Windows ICO ─────────────────────────────
                  # rc.exe 对小尺寸 PNG 格式支持有缺陷，必须用 BMP 格式
                  # 仅 256x256 使用 PNG 压缩（ICO 规范推荐）
                  def _build_ico(src_img, out_path, sizes):
                      """生成 rc.exe 兼容的 ICO：小尺寸用 BMP，256 用 PNG"""
                      import struct as _st
                      entries = []
                      for s in sizes:
                          ri = src_img.resize((s, s), Image.LANCZOS).convert('RGBA')
                          if s >= 256:
                              buf = io.BytesIO()
                              ri.save(buf, format='PNG')
                              entries.append((s, buf.getvalue()))
                          else:
                              # BMP DIB: BITMAPINFOHEADER + pixel data (bottom-up BGRA) + AND mask
                              w, h = ri.size
                              pixels = ri.load()
                              # BITMAPINFOHEADER (40 bytes)
                              bih = _st.pack('<IiiHHIIiiII',
                                  40,        # biSize
                                  w,         # biWidth
                                  h * 2,     # biHeight (doubled: XOR + AND)
                                  1,         # biPlanes
                                  32,        # biBitCount
                                  0,         # biCompression (BI_RGB)
                                  0,         # biSizeImage (can be 0 for BI_RGB)
                                  0, 0,      # biXPelsPerMeter, biYPelsPerMeter
                                  0, 0,      # biClrUsed, biClrImportant
                              )
                              # XOR bitmap (bottom-up, BGRA)
                              xor_data = bytearray()
                              for y in range(h - 1, -1, -1):
                                  for x in range(w):
                                      r, g, b, a = pixels[x, y]
                                      xor_data += bytes([b, g, r, a])
                              # AND mask (1bpp, bottom-up, rows padded to 4 bytes)
                              and_row_bytes = ((w + 31) // 32) * 4
                              and_data = bytes(and_row_bytes * h)
                              entries.append((s, bih + bytes(xor_data) + and_data))
                      # Write ICO file
                      count = len(entries)
                      header = _st.pack('<HHH', 0, 1, count)
                      data_offset = 6 + count * 16
                      directory = b''
                      image_data = b''
                      for s, raw in entries:
                          w_byte = 0 if s >= 256 else s
                          h_byte = 0 if s >= 256 else s
                          directory += _st.pack('<BBBBHHII',
                              w_byte, h_byte, 0, 0, 1, 32, len(raw), data_offset)
                          data_offset += len(raw)
                          image_data += raw
                      Path(out_path).write_bytes(header + directory + image_data)

                  ico = Path('windows/runner/resources/app_icon.ico')
                  if ico.parent.exists():
                      ico_sizes = [16, 20, 24, 32, 40, 48, 64, 128, 256]
                      _build_ico(img, str(ico), ico_sizes)
                      print(f'[inject] Windows ICO ({len(ico_sizes)} 尺寸, BMP+PNG): {ico}')

                  # ── macOS appiconset ────────────────────────
                  # 用 Contents.json 里的 size/scale 字段计算像素尺寸，不依赖文件名格式
                  appiconset = Path('macos/Runner/Assets.xcassets/AppIcon.appiconset')
                  if appiconset.exists():
                      contents_file = appiconset / 'Contents.json'
                      if contents_file.exists():
                          data = _json.loads(contents_file.read_text())
                          processed = set()
                          for item in data.get('images', []):
                              fname = item.get('filename', '')
                              if not fname or fname in processed:
                                  continue
                              processed.add(fname)
                              size_str  = item.get('size', '')    # e.g. "16x16"
                              scale_str = item.get('scale', '1x') # e.g. "2x"
                              try:
                                  base_px = int(size_str.split('x')[0])
                                  scale   = int(scale_str.rstrip('x'))
                                  px = base_px * scale
                                  img.resize((px, px), Image.LANCZOS).save(appiconset / fname)
                                  print(f'[inject] macOS icon: {fname} ({px}x{px})')
                              except Exception as ex:
                                  print(f'[inject] ⚠️  macOS icon {fname} 跳过: {ex}')
                      print(f'[inject] macOS 图标替换完成')

                  # ── iOS appiconset ─────────────────────────
                  ios_appiconset = Path('ios/Runner/Assets.xcassets/AppIcon.appiconset')
                  if ios_appiconset.exists():
                      contents_file = ios_appiconset / 'Contents.json'
                      if contents_file.exists():
                          data = _json.loads(contents_file.read_text())
                          processed = set()
                          for item in data.get('images', []):
                              fname = item.get('filename', '')
                              if not fname or fname in processed:
                                  continue
                              processed.add(fname)
                              size_str  = item.get('size', '')
                              scale_str = item.get('scale', '1x')
                              try:
                                  base_px = int(size_str.split('x')[0])
                                  scale   = int(scale_str.rstrip('x'))
                                  px = base_px * scale
                                  img.resize((px, px), Image.LANCZOS).save(ios_appiconset / fname)
                                  print(f'[inject] iOS icon: {fname} ({px}x{px})')
                              except Exception as ex:
                                  print(f'[inject] ⚠️  iOS icon {fname} 跳过: {ex}')
                      print(f'[inject] iOS 图标替换完成')

                  # ── assets/images/ ──────────────────────────
                  assets_img = Path('assets/images')
                  if assets_img.exists():
                      img_1024 = img.resize((1024, 1024), Image.LANCZOS)
                      for name in ['icon.png', 'icon_black.png', 'icon_white.png']:
                          p = assets_img / name
                          if p.exists():
                              img_1024.save(p)
                              print(f'[inject] assets/images: {p}')
                      _tray_ico_sizes = [16, 20, 24, 32, 40, 48, 64, 128, 256]
                      for name in ['icon.ico', 'icon_black.ico', 'icon_white.ico']:
                          p = assets_img / name
                          if p.exists():
                              _build_ico(img, str(p), _tray_ico_sizes)
                              print(f'[inject] assets/images ICO: {p}')

                      # ── macOS tray icon（彩色小图标，非 template）──
                      # macOS 菜单栏用 isTemplate=false + 彩色图标
                      # 缩放到 44x44 并加圆角，透明背景
                      tray_p = assets_img / 'tray_icon.png'
                      try:
                          tray_size = 44
                          tray_src = img.resize((tray_size, tray_size), Image.LANCZOS).convert('RGBA')
                          # 创建圆角蒙版
                          from PIL import ImageDraw
                          mask = Image.new('L', (tray_size, tray_size), 0)
                          md = ImageDraw.Draw(mask)
                          radius = tray_size // 4  # 11px 圆角
                          md.rounded_rectangle([0, 0, tray_size - 1, tray_size - 1], radius=radius, fill=255)
                          # 合成：透明背景 + 圆角 logo
                          tray_img = Image.new('RGBA', (tray_size, tray_size), (0, 0, 0, 0))
                          tray_img.paste(tray_src, mask=mask)
                          tray_img.save(tray_p)
                          print(f'[inject] macOS tray icon: {tray_p}')
                      except Exception as ex:
                          print(f'[inject] ⚠️  tray_icon 生成跳过: {ex}')

                  print(f'[inject] ✅ 图标替换全部完成')
              except Exception as e:
                  import traceback, sys
                  print(f'[inject] ❌ 图标替换失败: {e}')
                  traceback.print_exc()
                  sys.exit(1)  # 图标替换失败时中止构建，防止发布默认图标

          PYEOF

      # ── 3. Android 签名配置（可选）──────────────────────────
      - name: Setup Android signing
        if: matrix.platform == 'android'
        env:
          KEYSTORE:       ${{ secrets.KEYSTORE }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE" ]; then
            echo "$KEYSTORE" | base64 --decode > android/app/keystore.jks
            echo "keyAlias=$KEY_ALIAS"           >> android/local.properties
            echo "storePassword=$STORE_PASSWORD" >> android/local.properties
            echo "keyPassword=$KEY_PASSWORD"     >> android/local.properties
          fi

      # ── 4. Windows 构建依赖 ──────────────────────────────────
      - name: Setup Windows build environment
        if: matrix.platform == 'windows'
        run: |
          if ! command -v jq &>/dev/null; then
            choco install jq -y --no-progress && \
              echo "/c/ProgramData/chocolatey/bin" >> $GITHUB_PATH || true
          fi
          if ! command -v cargo &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
          cargo --version
          ATL_GLOB="/c/Program Files (x86)/Microsoft Visual Studio/2022/BuildTools/VC/Tools/MSVC/*/atlmfc/include/atlstr.h"
          if ! ls $ATL_GLOB 1>/dev/null 2>&1; then
            choco install visualstudio2022buildtools \
              --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools \
                --add Microsoft.VisualStudio.Component.VC.ATL \
                --add Microsoft.VisualStudio.Component.VC.ATLMFC \
                --includeRecommended --quiet" \
              -y --force || true
          fi
          INNO_EXE="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          if [ ! -f "$INNO_EXE" ]; then
            choco install innosetup -y --no-progress
          fi
          echo "/c/Program Files (x86)/Inno Setup 6" >> $GITHUB_PATH

      # ── 5. macOS：没有自定义 logo 时，从默认源图标生成全套 appiconset ──
      # 有 logo 时 inject 步骤已用 PIL 替换，这里只处理无 logo 的情况
      - name: Generate macOS icons from default source (no logo)
        if: matrix.platform == 'macos' && (github.event_name != 'workflow_dispatch' || inputs.app_logo_url == '')
        run: |
          SRC="assets/images/icon.png"
          ICONSET="macos/Runner/Assets.xcassets/AppIcon.appiconset"
          for SIZE in 16 32 64 128 256 512 1024; do
            sips -z $SIZE $SIZE "$SRC" --out "$ICONSET/app_icon_${SIZE}.png" --resampleFilter lanczos > /dev/null
          done
          echo "macOS icons regenerated from $SRC"
          ls -lh "$ICONSET"/*.png

      # ── 5b. macOS：清除 SPM 构建缓存 ────────────────────────
      - name: Clean macOS SPM cache
        if: matrix.platform == 'macos'
        run: |
          rm -rf macos/Runner.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/
          rm -rf macos/Runner.xcworkspace/xcshareddata/swiftpm/

      # ── 6. 安装 Go ───────────────────────────────────────────
      - name: Setup Go
        if: github.event_name == 'push' || inputs.platforms == '' || contains(inputs.platforms, matrix.platform)
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      # ── 7. 安装 Flutter ──────────────────────────────────────
      - name: Setup Flutter
        if: github.event_name == 'push' || inputs.platforms == '' || contains(inputs.platforms, matrix.platform)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 8. Windows: 安装 flutter_distributor ─────────────────
      - name: Setup flutter_distributor (Windows)
        if: matrix.platform == 'windows'
        run: |
          PUB_BIN="/c/Users/$(whoami)/AppData/Local/Pub/Cache/bin"
          echo "$PUB_BIN" >> $GITHUB_PATH
          dart pub global activate flutter_distributor

      # ── 8b. Linux: 安装系统依赖 ─────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libwebkit2gtk-4.1-dev

      # ── 9. 安装项目依赖 ──────────────────────────────────────
      - name: Install dependencies
        if: github.event_name == 'push' || inputs.platforms == '' || contains(inputs.platforms, matrix.platform)
        run: flutter pub get

      # ── 10. 生成 SDK 代码 ─────────────────────────────────────
      - name: Generate SDK code
        if: github.event_name == 'push' || inputs.platforms == '' || contains(inputs.platforms, matrix.platform)
        run: |
          cd lib/sdk/flutter_xboard_sdk
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ../../..

      # ── 11. 生成主项目代码 ────────────────────────────────────
      - name: Generate project code
        if: github.event_name == 'push' || inputs.platforms == '' || contains(inputs.platforms, matrix.platform)
        run: dart run build_runner build --delete-conflicting-outputs

      # ── 12. 编译构建（非 iOS）──────────────────────────────────
      - name: Build
        # iOS 有独立的 step 12b-ios，此处跳过
        if: |
          matrix.platform != 'ios' && (
          github.event_name == 'push' ||
          inputs.platforms == '' ||
          contains(inputs.platforms, matrix.platform)
          )
        env:
          APP_NAME:   ${{ inputs.app_name }}
          XOR_KEY:    ${{ inputs.xor_key }}
          OSS_URL_1:  ${{ inputs.oss_url_1 }}
          OSS_URL_2:  ${{ inputs.oss_url_2 }}
          OSS_URL_3:  ${{ inputs.oss_url_3 }}
          OSS_URL_4:  ${{ inputs.oss_url_4 }}
          PANEL_TYPE: ${{ inputs.panel_type || 'xboard' }}
          API_PREFIX: ${{ inputs.api_prefix || '/api/v1' }}
          ANDROID_FLAVOR: ${{ matrix.flavor || '' }}
        run: |
          dart setup.dart ${{ matrix.platform }} \
            ${{ matrix.arch && format('--arch {0}', matrix.arch) || '' }} \
            ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      # ── 12b-ios. iOS: 编译 mihomo 核心库 + 生成 iOS 项目 + 构建 IPA ──
      - name: Setup iOS project and build IPA
        if: matrix.platform == 'ios'
        env:
          APP_NAME:    ${{ inputs.app_name }}
          APP_LOGO_URL: ${{ inputs.app_logo_url }}
          APP_VERSION: ${{ inputs.app_version }}
          BUNDLE_ID:   ${{ vars.IOS_BUNDLE_ID || 'com.apex.vpn' }}
          APP_GROUP:   ${{ vars.IOS_APP_GROUP || 'group.com.apex.vpn' }}
          XOR_KEY:     ${{ inputs.xor_key }}
          OSS_URL_1:   ${{ inputs.oss_url_1 }}
          OSS_URL_2:   ${{ inputs.oss_url_2 }}
          OSS_URL_3:   ${{ inputs.oss_url_3 }}
          OSS_URL_4:   ${{ inputs.oss_url_4 }}
          PANEL_TYPE:  ${{ inputs.panel_type || 'xboard' }}
          API_PREFIX:  ${{ inputs.api_prefix || '/api/v1' }}
        run: |
          set -e

          BUNDLE_ID="${BUNDLE_ID:-com.apex.vpn}"
          APP_GROUP="${APP_GROUP:-group.${BUNDLE_ID}}"

          echo "=== [iOS] Step 1: Install Go ==="
          brew install go || true
          export PATH="$(go env GOPATH)/bin:$PATH"
          go version

          echo "=== [iOS] Step 2: Compile core for iOS arm64 ==="
          cd core

          # Cross-compile Go → iOS static archive (from project's core/ directory)
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CC=$(xcrun -f clang)
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
            CGO_CFLAGS="-isysroot $SDK -arch arm64 -mios-version-min=14.0" \
            CGO_LDFLAGS="-isysroot $SDK -arch arm64" \
            CC="$CC" \
            go build -tags with_gvisor -buildmode=c-archive -o libclash.a .

          # Verify Go build produced expected outputs
          if [ ! -f libclash.a ]; then
            echo "❌ Go build failed: libclash.a not found"
            exit 1
          fi
          if [ ! -f libclash.h ]; then
            echo "❌ Go build failed: libclash.h not found"
            exit 1
          fi
          echo "[iOS] Go build output: $(ls -lh libclash.a libclash.h)"

          # Package as xcframework for Xcode linking
          mkdir -p headers
          cp libclash.h headers/
          xcodebuild -create-xcframework \
            -library libclash.a -headers headers \
            -output libclash.xcframework

          if [ ! -d libclash.xcframework ]; then
            echo "❌ xcframework creation failed"
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/ios/Frameworks"
          cp -r libclash.xcframework "$GITHUB_WORKSPACE/ios/Frameworks/"
          echo "[iOS] ✅ libclash.xcframework built and copied"
          cd "$GITHUB_WORKSPACE"

          echo "=== [iOS] Step 3: iOS project (committed, skip flutter create) ==="
          # ios/ directory is already committed in the repo — no need for flutter create.
          # Just verify it exists.
          if [ ! -f ios/Runner.xcodeproj/project.pbxproj ]; then
            echo "❌ ios/ directory not found in repo — aborting"
            exit 1
          fi
          echo "[iOS] ✓ ios/ directory found"

          echo "=== [iOS] Step 3b: Inject iOS app name and icon ==="
          if [ -n "$APP_NAME" ] && [ -f ios/Runner/Info.plist ]; then
            python3 -X utf8 -c "
          import re, os, io, urllib.request
          from pathlib import Path
          app_name = os.environ.get('APP_NAME', '').strip()
          logo_url = os.environ.get('APP_LOGO_URL', '').strip()
          if app_name:
              p = Path('ios/Runner/Info.plist')
              if p.exists():
                  txt = p.read_text()
                  txt = re.sub(r'(<key>CFBundleName</key>\s*<string>)[^<]*(</string>)', rf'\g<1>{app_name}\g<2>', txt)
                  if 'CFBundleDisplayName' in txt:
                      txt = re.sub(r'(<key>CFBundleDisplayName</key>\s*<string>)[^<]*(</string>)', rf'\g<1>{app_name}\g<2>', txt)
                  else:
                      txt = txt.replace('<key>CFBundleName</key>', f'<key>CFBundleDisplayName</key>\n\t<string>{app_name}</string>\n\t<key>CFBundleName</key>')
                  p.write_text(txt)
                  print(f'[inject-ios] CFBundleName/DisplayName -> {app_name}')
          if logo_url:
              try:
                  from PIL import Image
                  import json as _json
                  req = urllib.request.Request(logo_url, headers={'User-Agent': 'Mozilla/5.0'})
                  raw = urllib.request.urlopen(req, timeout=30).read()
                  img = Image.open(io.BytesIO(raw)).convert('RGBA')
                  print(f'[inject-ios] logo downloaded: {img.size}')
                  appiconset = Path('ios/Runner/Assets.xcassets/AppIcon.appiconset')
                  if appiconset.exists():
                      contents_file = appiconset / 'Contents.json'
                      if contents_file.exists():
                          data = _json.loads(contents_file.read_text())
                          processed = set()
                          for item in data.get('images', []):
                              fname = item.get('filename', '')
                              if not fname or fname in processed: continue
                              processed.add(fname)
                              size_str = item.get('size', '')
                              scale_str = item.get('scale', '1x')
                              try:
                                  base_px = int(size_str.split('x')[0])
                                  scale = int(scale_str.rstrip('x'))
                                  px = base_px * scale
                                  img.resize((px, px), Image.LANCZOS).save(appiconset / fname)
                                  print(f'[inject-ios] icon: {fname} ({px}x{px})')
                              except Exception as ex:
                                  print(f'[inject-ios] icon {fname} skip: {ex}')
                      print('[inject-ios] icon replacement done')
              except Exception as e:
                  print(f'[inject-ios] logo download/process failed: {e}')
          "
          fi

          echo "=== [iOS] Step 4: Setup Xcode project (PacketTunnel extension) ==="
          gem install xcodeproj --quiet
          ruby scripts/setup_ios.rb "${BUNDLE_ID}" "${APP_GROUP}"

          echo "=== [iOS] Step 5: Build unsigned IPA ==="
          # Build dart-define args
          IOS_DART_DEFINES="--dart-define=APP_GROUP_ID=${APP_GROUP}"
          # Mark as stable build (removes PRE banner)
          if [ "${{ env.IS_STABLE }}" = "true" ]; then
            IOS_DART_DEFINES="$IOS_DART_DEFINES --dart-define=APP_ENV=stable"
          fi
          for KEY in XOR_KEY OSS_URL_1 OSS_URL_2 OSS_URL_3 OSS_URL_4 PANEL_TYPE API_PREFIX; do
            VAL=$(eval echo "\$$KEY")
            if [ -n "$VAL" ]; then
              IOS_DART_DEFINES="$IOS_DART_DEFINES --dart-define=$KEY=$VAL"
            fi
          done
          flutter build ipa --no-codesign $IOS_DART_DEFINES

          # Build PacketTunnel extension separately.
          # flutter build ipa only builds the Runner target — the PacketTunnel
          # extension target (added by setup_ios.rb) is not compiled by Flutter.
          echo "=== [iOS] Step 5b: Build PacketTunnel extension ==="
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme PacketTunnel \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR="$(pwd)/build/ios/extension" \
            2>&1 | tail -20
          APPEX_BUILT=$(find build/ios/extension -name "PacketTunnel.appex" -type d 2>/dev/null | head -1)
          if [ -n "$APPEX_BUILT" ]; then
            echo "[iOS] ✅ PacketTunnel.appex built: $APPEX_BUILT"
          else
            echo "[iOS] ⚠️ xcodebuild for PacketTunnel may have failed, trying scheme-less build..."
            xcodebuild -project ios/Runner.xcodeproj \
              -target PacketTunnel \
              -configuration Release \
              -sdk iphoneos \
              -arch arm64 \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ONLY_ACTIVE_ARCH=NO \
              BUILD_DIR="$(pwd)/build/ios/extension" \
              2>&1 | tail -20
            APPEX_BUILT=$(find build/ios/extension -name "PacketTunnel.appex" -type d 2>/dev/null | head -1)
            if [ -n "$APPEX_BUILT" ]; then
              echo "[iOS] ✅ PacketTunnel.appex built (target mode): $APPEX_BUILT"
            else
              echo "[iOS] ❌ PacketTunnel.appex build failed!"
              find build/ios/extension -type f 2>/dev/null | head -20
            fi
          fi

          # Create IPA from xcarchive (Flutter --no-codesign skips IPA export)
          mkdir -p dist
          XCARCHIVE=$(find build/ios/archive -name "*.xcarchive" | head -1)
          APP_NAME_SAFE=$(echo "${APP_NAME:-Apex}" | tr '[:space:]/' '_')

          if [ -n "$XCARCHIVE" ]; then
            echo "[iOS] Found xcarchive: $XCARCHIVE"
            # Build IPA manually: Payload/Runner.app → .ipa (zip)
            PAYLOAD_DIR=$(mktemp -d)/Payload
            mkdir -p "$PAYLOAD_DIR"
            cp -R "$XCARCHIVE/Products/Applications/"*.app "$PAYLOAD_DIR/"

            # Verify PacketTunnel.appex is embedded in the .app bundle
            RUNNER_APP=$(ls -d "$PAYLOAD_DIR/"*.app | head -1)
            if [ -d "$RUNNER_APP/PlugIns/PacketTunnel.appex" ]; then
              echo "[iOS] ✓ PacketTunnel.appex found in PlugIns/"
            else
              echo "[iOS] ⚠️ PacketTunnel.appex NOT in PlugIns/ — copying from build..."
              # Copy from the separately-built extension
              APPEX=$(find build/ios/extension -name "PacketTunnel.appex" -type d 2>/dev/null | head -1)
              if [ -z "$APPEX" ]; then
                APPEX=$(find build/ios -name "PacketTunnel.appex" -type d 2>/dev/null | head -1)
              fi
              if [ -n "$APPEX" ]; then
                mkdir -p "$RUNNER_APP/PlugIns"
                cp -R "$APPEX" "$RUNNER_APP/PlugIns/"
                echo "[iOS] ✓ Manually copied PacketTunnel.appex to PlugIns/"
              else
                echo "[iOS] ❌ WARNING: PacketTunnel.appex not found anywhere! VPN will not work."
              fi
            fi

            # Ad-hoc sign with entitlements so TrollStore can read them.
            # --no-codesign builds have no entitlements embedded, which causes
            # "saveToPreferences: permission denied" for Network Extension.
            echo "[iOS] Injecting entitlements via ad-hoc codesign..."

            # Sign PacketTunnel extension first (inside-out signing order)
            if [ -d "$RUNNER_APP/PlugIns/PacketTunnel.appex" ]; then
              codesign -f -s - --entitlements ios/PacketTunnel/PacketTunnel.entitlements \
                "$RUNNER_APP/PlugIns/PacketTunnel.appex"
              echo "[iOS] ✓ PacketTunnel.appex signed with entitlements"
            fi

            # Sign all embedded frameworks (must be signed before main app)
            if [ -d "$RUNNER_APP/Frameworks" ]; then
              find "$RUNNER_APP/Frameworks" -name "*.framework" -o -name "*.dylib" | while read fw; do
                codesign -f -s - "$fw" 2>/dev/null || true
              done
              echo "[iOS] ✓ Frameworks signed"
            fi

            # Sign main app with Runner entitlements
            codesign -f -s - --entitlements ios/Runner/Runner.entitlements "$RUNNER_APP"
            echo "[iOS] ✓ Runner.app signed with entitlements"

            # Verify entitlements were injected
            echo "[iOS] Runner entitlements:"
            codesign -d --entitlements - "$RUNNER_APP" 2>/dev/null | head -20
            if [ -d "$RUNNER_APP/PlugIns/PacketTunnel.appex" ]; then
              echo "[iOS] PacketTunnel entitlements:"
              codesign -d --entitlements - "$RUNNER_APP/PlugIns/PacketTunnel.appex" 2>/dev/null | head -20
            fi

            cd "$(dirname "$PAYLOAD_DIR")"
            zip -qr "dist_ipa.ipa" Payload
            cp "dist_ipa.ipa" "$OLDPWD/dist/${APP_NAME_SAFE}.ipa"
            cd "$OLDPWD"
            echo "[iOS] ✅ IPA: dist/${APP_NAME_SAFE}.ipa ($(du -sh "dist/${APP_NAME_SAFE}.ipa" | cut -f1))"
          else
            # Fallback: check if Flutter generated IPA directly
            IPA_PATH=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
            if [ -n "$IPA_PATH" ]; then
              cp "$IPA_PATH" "dist/${APP_NAME_SAFE}.ipa"
              echo "[iOS] ✅ IPA: dist/${APP_NAME_SAFE}.ipa ($(du -sh "dist/${APP_NAME_SAFE}.ipa" | cut -f1))"
            else
              echo "[iOS] ❌ No xcarchive or IPA found"
              ls -la build/ios/ 2>/dev/null || true
              exit 1
            fi
          fi

      # ── 12a-mac. macOS: ad-hoc 签名（未签名的 .app 在 macOS 10.15+ 无法打开）──
      - name: Sign macOS app (ad-hoc)
        if: matrix.platform == 'macos'
        run: |
          # flutter_distributor 产出 DMG 在 dist/ 下，需要从 DMG 提取 .app 签名后重新打包
          # 但更简单的方式：直接签名 build 目录中的 .app，然后重新生成 DMG
          APP_DIR=$(find build/macos/Build/Products/Release -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "[sign] ⚠️ No .app found in build output, trying dist/"
            # 尝试从 dist/ 中的 DMG 挂载提取
            DMG_FILE=$(find dist -name "*.dmg" 2>/dev/null | head -1)
            if [ -n "$DMG_FILE" ]; then
              echo "[sign] Found DMG: $DMG_FILE"
              MOUNT_DIR=$(mktemp -d)
              hdiutil attach "$DMG_FILE" -mountpoint "$MOUNT_DIR" -nobrowse -quiet
              APP_IN_DMG=$(find "$MOUNT_DIR" -name "*.app" -maxdepth 1 -type d | head -1)
              if [ -n "$APP_IN_DMG" ]; then
                WORK_DIR=$(mktemp -d)
                cp -R "$APP_IN_DMG" "$WORK_DIR/"
                hdiutil detach "$MOUNT_DIR" -quiet
                APP_DIR=$(find "$WORK_DIR" -name "*.app" -type d | head -1)
              else
                hdiutil detach "$MOUNT_DIR" -quiet
                echo "[sign] ❌ No .app found in DMG"
                exit 0
              fi
            else
              echo "[sign] ❌ No DMG found in dist/"
              exit 0
            fi
          fi

          echo "[sign] Signing: $APP_DIR"

          # 递归签名所有 frameworks 和 dylibs（由内而外）
          find "$APP_DIR" -name "*.framework" -o -name "*.dylib" | while read fw; do
            codesign --force --deep --sign - "$fw" 2>/dev/null || true
          done

          # 签名主 App（ad-hoc，与 FlClash 上游一致）
          codesign --force --deep --sign - "$APP_DIR"
          echo "[sign] ✅ Ad-hoc signed: $APP_DIR"

          # 验证签名
          codesign -v "$APP_DIR" && echo "[sign] ✓ Signature valid" || echo "[sign] ⚠️ Signature verification warning"

          # 如果是从 DMG 提取的，需要重新打包 DMG
          if [ -n "$DMG_FILE" ] && [ -n "$WORK_DIR" ]; then
            APP_NAME_BUNDLE=$(basename "$APP_DIR")
            echo "[sign] Repacking DMG with signed app..."
            rm -f "$DMG_FILE"
            # 用 hdiutil 创建新 DMG
            STAGING=$(mktemp -d)
            cp -R "$APP_DIR" "$STAGING/"
            ln -s /Applications "$STAGING/Applications"
            hdiutil create -volname "$(basename "$DMG_FILE" .dmg)" \
              -srcfolder "$STAGING" \
              -ov -format UDZO \
              "$DMG_FILE"
            rm -rf "$STAGING" "$WORK_DIR"
            echo "[sign] ✅ DMG repacked: $DMG_FILE"
          fi

      # ── 12b. 重命名输出文件（ASCII 包名 → 完整 App 名）──
      - name: Rename dist files
        if: (matrix.platform == 'windows' || matrix.platform == 'linux') && github.event_name == 'workflow_dispatch' && inputs.app_name != ''
        env:
          APP_NAME: ${{ inputs.app_name }}
        run: |
          python3 -X utf8 << 'PYEOF'
          import os, re
          from pathlib import Path

          app_name = os.environ.get('APP_NAME', '').strip()
          if not app_name:
              print('[rename] APP_NAME not set, skipping')
              exit(0)

          # 与 inject 步骤相同的 sanitize 逻辑，得到打包工具用的 ASCII 名
          ascii_name = re.sub(r'[\s/\\:*?"<>|]+', '_', app_name)
          ascii_name = re.sub(r'[^\x00-\x7F]+', '', ascii_name)
          ascii_name = re.sub(r'[^a-zA-Z0-9_-]+', '_', ascii_name).strip('_') or 'Apex'

          if ascii_name == app_name:
              print(f'[rename] ascii name == app_name ("{app_name}")，无需重命名')
              exit(0)

          dist = Path('dist')
          if not dist.exists():
              print('[rename] dist/ 不存在，跳过')
              exit(0)

          renamed = 0
          for f in sorted(dist.rglob('*')):
              if f.is_file() and ascii_name in f.name:
                  new_name = f.name.replace(ascii_name, app_name, 1)
                  new_path = f.parent / new_name
                  f.rename(new_path)
                  print(f'[rename] {f.name} → {new_name}')
                  renamed += 1

          print(f'[rename] 共重命名 {renamed} 个文件（ascii="{ascii_name}", app="{app_name}"）')
          PYEOF

      # ── 12c. Windows: 下载 VC++ 运行库（Inno 安装包内置）────
      - name: Download VC++ Redistributable
        if: matrix.platform == 'windows'
        run: curl -fsSL --retry 3 --retry-delay 5 -o vc_redist.x64.exe "https://aka.ms/vs/17/release/vc_redist.x64.exe"

      # ── 12d. Windows: Inno Setup 打包 ────────────────────────
      - name: Build Windows installer (Inno Setup)
        if: matrix.platform == 'windows'
        run: |
          APP_NAME="${{ inputs.app_name }}"
          APP_NAME="${APP_NAME:-Apex}"

          APP_VERSION="${{ inputs.app_version }}"
          if [ -z "$APP_VERSION" ]; then
            APP_VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          fi

          # 从 CMakeLists.txt 读取实际 exe 名（inject 步骤可能已修改）
          # 注意：不能用 grep -oP（Perl正则），Windows CI 的 Git Bash 不支持，
          # 会静默失败导致回退到 FlClash → 快捷方式指向错误的 exe
          BINARY_EXE=$(sed -n 's/.*set(BINARY_NAME[[:space:]]*"\([^"]*\)").*/\1/p' windows/CMakeLists.txt 2>/dev/null)
          BINARY_EXE="${BINARY_EXE:-Apex}"

          # 从 app_name SHA256 前 32 位生成稳定 GUID（同名每次固定）
          HASH=$(echo -n "$APP_NAME" | sha256sum | cut -c1-32 | tr '[:lower:]' '[:upper:]')
          APP_UUID="${HASH:0:8}-${HASH:8:4}-${HASH:12:4}-${HASH:16:4}-${HASH:20:12}"

          echo "Inno: AppName=$APP_NAME  BinaryExe=$BINARY_EXE  AppVersion=$APP_VERSION  AppId=$APP_UUID"

          if [ -f "update_installer.iss" ]; then
            mkdir -p dist
            # MSYS_NO_PATHCONV=1 防止 Git Bash 把 /DKey=Val 当成 Windows 路径转换
            # （/D 会被误判为驱动器盘符 D:\，导致 ISCC 收到多个"文件名"参数报错）
            MSYS_NO_PATHCONV=1 ISCC.exe \
              "/DMyAppName=$APP_NAME" \
              "/DMyBinaryName=$BINARY_EXE" \
              "/DMyAppVersion=$APP_VERSION" \
              "/DMyAppId=$APP_UUID" \
              update_installer.iss
          else
            echo "[installer] update_installer.iss not found, skipping"
          fi

      # ── 13. 构建结果诊断 ──────────────────────────────────────
      - name: Debug dist output
        if: always()
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "[dist/ not found]"

      # ── 14. 上传构建产物 ──────────────────────────────────────
      - name: Upload artifact
        if: |
          github.event_name == 'push' ||
          inputs.platforms == '' ||
          contains(inputs.platforms, matrix.platform)
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}${{ matrix.flavor && format('-{0}', matrix.flavor) || '' }}
          path: ./dist
          overwrite: true

      # ── 15. 构建完成：通过 TG 发包 ─────────────────────────
      # 仅 workflow_dispatch 且配置了 notify_chat_id 时触发
      # 使用 Python：全平台统一 UTF-8，Android 多 APK 合并为一条消息
      - name: Notify and send artifacts to Telegram
        if: |
          always() &&
          github.event_name == 'workflow_dispatch' &&
          inputs.notify_chat_id != '' &&
          (inputs.platforms == '' || contains(inputs.platforms, matrix.platform))
        env:
          BOT_TOKEN:  ${{ secrets.BUILD_BOT_TOKEN }}
          CHAT_ID:    ${{ inputs.notify_chat_id }}
          PLATFORM:   ${{ matrix.platform }}
          ARCH:       ${{ matrix.arch }}
          FLAVOR:     ${{ matrix.flavor || '' }}
          RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          PYTHONUTF8: "1"
        run: |
          python3 -X utf8 - << 'PYEOF'
          import os, sys, json, urllib.request
          from pathlib import Path

          bot_token = os.environ.get("BOT_TOKEN", "").strip()
          if not bot_token:
              print("[notify] BUILD_BOT_TOKEN not configured, skip")
              sys.exit(0)

          chat_id    = os.environ.get("CHAT_ID", "").strip()
          platform   = os.environ.get("PLATFORM", "").strip()
          arch       = os.environ.get("ARCH", "").strip()
          flavor     = os.environ.get("FLAVOR", "").strip()
          run_url    = os.environ.get("RUN_URL", "").strip()
          job_status = os.environ.get("JOB_STATUS", "").strip()
          API        = f"https://api.telegram.org/bot{bot_token}"

          LABELS = {
              "android-mobile": "📱 Android 手机版",
              "android-tv":     "📺 Android TV版",
              "windows-amd64":    "🖥️ Windows (x64)",
              "macos-universal":  "🍏 macOS (Universal)",
              "linux-amd64":      "🐧 Linux (x64)",
              "ios-arm64":        "🍎 iOS",
          }
          # Android 用 flavor 作 key（android-mobile / android-tv），其他平台用 arch
          lookup_key = f"{platform}-{flavor}" if flavor else f"{platform}-{arch}"
          label = LABELS.get(lookup_key, f"{platform}{'-'+arch if arch else ''}{'-'+flavor if flavor else ''}")

          def send_json(endpoint, data):
              req = urllib.request.Request(
                  f"{API}/{endpoint}",
                  data=json.dumps(data).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"[notify] {endpoint} error: {e}")
                  return {}

          def make_multipart(fields, files):
              boundary = "TGboundary7749"
              body = b""
              for k, v in fields.items():
                  body += (
                      f"--{boundary}\r\n"
                      f'Content-Disposition: form-data; name="{k}"\r\n\r\n{v}\r\n'
                  ).encode("utf-8")
              for name, fname, data in files:
                  body += (
                      f"--{boundary}\r\n"
                      f'Content-Disposition: form-data; name="{name}"; filename="{fname}"\r\n'
                      f"Content-Type: application/octet-stream\r\n\r\n"
                  ).encode("utf-8")
                  body += data
                  body += b"\r\n"
              body += f"--{boundary}--\r\n".encode("utf-8")
              return boundary, body

          def send_document(fp):
              boundary, body = make_multipart(
                  {"chat_id": chat_id},
                  [("document", fp.name, fp.read_bytes())],
              )
              req = urllib.request.Request(
                  f"{API}/sendDocument", data=body,
                  headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=120):
                      print(f"[notify] sent {fp.name}")
              except Exception as e:
                  print(f"[notify] failed {fp.name}: {e}")

          def send_media_group(fps):
              media = [{"type": "document", "media": f"attach://file{i}"} for i in range(len(fps))]
              files = [(f"file{i}", fp.name, fp.read_bytes()) for i, fp in enumerate(fps)]
              boundary, body = make_multipart(
                  {"chat_id": chat_id, "media": json.dumps(media)},
                  files,
              )
              req = urllib.request.Request(
                  f"{API}/sendMediaGroup", data=body,
                  headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=180):
                      print(f"[notify] sent media group ({len(fps)} files)")
              except Exception as e:
                  print(f"[notify] media group failed: {e}, falling back")
                  for fp in fps:
                      send_document(fp)

          if job_status == "success":
              msg = f"\u2705 *{label}* \u6784\u5efa\u5b8c\u6210"
          else:
              msg = f"\u274c *{label}* \u6784\u5efa\u5931\u8d25 \u2014 [\u67e5\u770b\u65e5\u5fd7]({run_url})"

          send_json("sendMessage", {
              "chat_id": chat_id,
              "text": msg,
              "parse_mode": "Markdown",
              "disable_web_page_preview": True,
          })

          if job_status == "success":
              dist = Path("dist")
              all_files = sorted(
                  f for f in dist.rglob("*")
                  if f.is_file() and not f.name.endswith(".sha256")
              ) if dist.exists() else []

              file_list = "\n".join(f"• `{f.name}`" for f in all_files) if all_files else "（无文件）"

              send_json("sendMessage", {
                  "chat_id": chat_id,
                  "text": f"\U0001f4e6 *{label}* 安装包：\n\n{file_list}\n\n\U0001f517 [前往 Actions 下载]({run_url})\n⚠️ 需登录 GitHub 账号",
                  "parse_mode": "Markdown",
                  "disable_web_page_preview": True,
              })
          PYEOF

  # ── OpenWrt：交叉编译 mihomo 核心（全架构合并为一个 artifact）──
  openwrt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'push' ||
      inputs.platforms == '' ||
      contains(inputs.platforms, 'openwrt')

    steps:
      - name: Configure git credentials
        run: |
          git config --global credential.helper ""
          git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          submodules: recursive
          ref: ${{ env.PRIVATE_REF }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Get version
        id: version
        run: |
          VER=$(grep -oP 'version:\s*\K[\d.]+' pubspec.yaml || echo "0.0.0")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Build all OpenWrt architectures
        run: |
          set -e
          VER="${{ steps.version.outputs.version }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          APP_NAME="${{ inputs.app_name || 'mihomo' }}"
          LDFLAGS="-w -s -X 'github.com/metacubex/mihomo/constant.Version=$VER' -X 'github.com/metacubex/mihomo/constant.BuildTime=$BUILD_TIME'"
          CORE_DIR="core/Clash.Meta"
          mkdir -p dist

          build_arch() {
            local arch="$1" goarch="$2" goarm="$3" gomips="$4"
            echo "=== Building $arch ==="

            GOOS=linux GOARCH="$goarch" GOARM="$goarm" GOMIPS="$gomips" CGO_ENABLED=0 \
              go build -C "$CORE_DIR" -tags="with_gvisor" -trimpath -ldflags="$LDFLAGS" -o "/tmp/mihomo-$arch"

            local pkg="/tmp/pkg-$arch"
            mkdir -p "$pkg/usr/bin" "$pkg/etc/init.d" "$pkg/etc/config" "$pkg/etc/mihomo" "$pkg/etc/uci-defaults"

            cp "/tmp/mihomo-$arch" "$pkg/usr/bin/mihomo"
            chmod +x "$pkg/usr/bin/mihomo"
            cp openwrt/etc/init.d/mihomo "$pkg/etc/init.d/mihomo"
            chmod +x "$pkg/etc/init.d/mihomo"
            cp openwrt/etc/config/mihomo "$pkg/etc/config/mihomo"
            cp openwrt/etc/mihomo/config.yaml "$pkg/etc/mihomo/config.yaml"
            cp openwrt/etc/uci-defaults/99-mihomo "$pkg/etc/uci-defaults/99-mihomo"
            chmod +x "$pkg/etc/uci-defaults/99-mihomo"

            (cd "$pkg" && tar czf "$GITHUB_WORKSPACE/dist/${APP_NAME}-openwrt-${arch}-${VER}.tar.gz" .)
            rm -rf "$pkg" "/tmp/mihomo-$arch"
          }

          build_arch amd64           amd64   "" ""
          build_arch arm64           arm64   "" ""
          build_arch armv7           arm     7  ""
          build_arch armv5           arm     5  ""
          build_arch mips-softfloat  mips    "" softfloat
          build_arch mipsle-softfloat mipsle "" softfloat

          echo "=== All OpenWrt packages ==="
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-openwrt
          path: dist/*
          compression-level: 0

      # ── OpenWrt 构建完成通知 ──
      - name: Notify Telegram
        if: |
          always() &&
          github.event_name == 'workflow_dispatch' &&
          inputs.notify_chat_id != ''
        env:
          BOT_TOKEN:  ${{ secrets.BUILD_BOT_TOKEN }}
          CHAT_ID:    ${{ inputs.notify_chat_id }}
          RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          PYTHONUTF8: "1"
        run: |
          python3 -X utf8 - << 'PYEOF'
          import os, sys, json, urllib.request
          from pathlib import Path

          bot_token = os.environ.get("BOT_TOKEN", "").strip()
          if not bot_token:
              sys.exit(0)

          chat_id    = os.environ.get("CHAT_ID", "").strip()
          run_url    = os.environ.get("RUN_URL", "").strip()
          job_status = os.environ.get("JOB_STATUS", "").strip()
          API        = f"https://api.telegram.org/bot{bot_token}"
          label      = "📡 OpenWrt"

          def send_json(endpoint, data):
              req = urllib.request.Request(
                  f"{API}/{endpoint}",
                  data=json.dumps(data).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"[notify] {endpoint} error: {e}")
                  return {}

          if job_status == "success":
              dist = Path("dist")
              files = sorted(f.name for f in dist.rglob("*") if f.is_file()) if dist.exists() else []
              file_list = "\n".join(f"• `{f}`" for f in files) if files else "（无文件）"
              msg = f"✅ *{label}* 构建完成（6 个架构）\n\n{file_list}\n\n🔗 [前往 Actions 下载]({run_url})\n⚠️ 需登录 GitHub 账号"
          else:
              msg = f"❌ *{label}* 构建失败 — [查看日志]({run_url})"

          send_json("sendMessage", {
              "chat_id": chat_id,
              "text": msg,
              "parse_mode": "Markdown",
              "disable_web_page_preview": True,
          })
          PYEOF

  # ── Release：打 tag 时自动发布到本公共仓库 ──────────────────
  release:
    needs: [build, openwrt]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          generate_release_notes: true
